<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoAnalyzer AI - Image Prompt Studio</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

    <!-- Header Frame -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="bg-gradient-to-tr from-amber-500 to-rose-600 p-2 rounded-xl shadow-lg shadow-rose-500/10">
                <i class="fa-solid fa-eye text-xl text-white"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-white">PhotoAnalyzer <span class="text-amber-400 font-extrabold text-xs tracking-wider uppercase ml-1">Studio</span></h1>
                <p class="text-xs text-slate-400">Reverse-Engineer Real Images to AI Prompts</p>
            </div>
        </div>
        <div class="flex items-center space-x-2 text-xs text-slate-400 bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-lg">
            <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span>Canvas State: Ready</span>
        </div>
      </header>
          <!-- Main Studio Dashboard -->
    <main class="flex-1 max-w-6xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Left Column: Upload Canvas & Modifiers -->
        <div class="lg:col-span-5 flex flex-col space-y-4">
            
            <!-- Dynamic Upload Dropzone -->
            <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-5 flex flex-col">
                <h3 class="text-xs font-bold tracking-wider uppercase text-slate-400 mb-3 flex items-center">
                    <i class="fa-solid fa-image text-amber-400 mr-2"></i> Source Image Canvas
                </h3>
                
                <label class="relative group cursor-pointer border-2 border-dashed border-slate-800 hover:border-amber-500/50 rounded-xl p-4 flex flex-col items-center justify-center transition-colors min-h-[180px] bg-slate-950/50 overflow-hidden">
                    <input type="file" id="image-loader" accept="image/*" class="hidden" onchange="previewSourceImage(this)">
                    
                    <!-- Empty State Graphic -->
                    <div id="upload-empty-state" class="text-center space-y-2 py-4">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-slate-600 group-hover:text-amber-400 transition-colors"></i>
                        <p class="text-xs font-medium text-slate-300">Tap to load target photo</p>
                        <p class="text-[10px] text-slate-500">Supports JPG, PNG, WEBP profiles</p>
                    </div>

                    <!-- Populated State Graphic -->
                    <img id="canvas-preview-display" class="hidden w-full max-h-[220px] object-contain rounded-lg shadow-md border border-slate-800">
                </label>
            </div>

            <!-- Descriptive Metadata Anchors -->
            <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-5 space-y-4 flex-1">
                <h3 class="text-xs font-bold tracking-wider uppercase text-slate-400 flex items-center">
                    <i class="fa-solid fa-tags text-rose-500 mr-2"></i> Composition Breakdown
                </h3>

                <!-- Core Subject Descriptor -->
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Core Photo Subject</label>
                    <input type="text" id="photo-subject" placeholder="e.g., A rugged vintage leather jacket on a wooden chair" 
                        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-amber-500">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <!-- Shot Type -->
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1.5">Shot Framing</label>
                        <select id="photo-framing" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500">
                            <option value="closeup">Extreme Closeup</option>
                            <option value="medium_shot">Medium Portrait Shot</option>
                            <option value="wide_angle">Wide Cinematic Shot</option>
                            <option value="drone_view">Aerial Drone Perspective</option>
                        </select>
                    </div>
                    <!-- Atmosphere Tone -->
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1.5">Atmosphere Tone</label>
                        <select id="photo-mood" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-amber-500">
                            <option value="moody">Moody & Shadowy</option>
                            <option value="sunlit">Bright Natural Sunlight</option>
                            <option value="vintage">Faded 35mm Vintage Film</option>
                            <option value="surreal">Neon Vaporwave Dream</option>
                        </select>
                    </div>
                </div>

                <button onclick="compileReversePrompt()" class="w-full bg-gradient-to-r from-amber-500 to-rose-600 text-white rounded-xl py-3 text-sm font-semibold hover:from-amber-400 hover:to-rose-500 transition shadow-lg shadow-rose-950/20 flex items-center justify-center space-x-2 cursor-pointer mt-2">
                    <i class="fa-solid fa-arrows-spin"></i> <span>Deconstruct & Compile Prompt</span>
                </button>
            </div>
        </div>

        <!-- Right Column: Terminal Display and Output -->
        <div class="lg:col-span-7 flex flex-col">
            <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-5 flex-1 flex flex-col">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-xs font-bold tracking-wider uppercase text-slate-400 flex items-center">
                        <i class="fa-solid fa-code text-amber-500 mr-2"></i> Reverse Engineered Prompt
                    </h3>
                    <button onclick="copyDeconstructedPrompt()" class="text-xs bg-slate-950 hover:bg-slate-800 border border-slate-800 px-3 py-1.5 rounded-lg text-amber-400 transition flex items-center space-x-1.5 cursor-pointer">
                        <i class="fa-regular fa-copy"></i> <span>Copy String</span>
                    </button>
                </div>

                <!-- Text Engine Terminal Frame -->
                <div class="flex-1 bg-slate-950 border border-slate-900 rounded-xl p-4 flex flex-col justify-between min-h-[280px]">
                    <p id="terminal-placeholder" class="text-sm text-slate-600 italic">Load your photo into the source canvas on the left, break down its core elements, and hit Compile to map out the generative string command.</p>
                    <div id="terminal-output-view" class="hidden h-full">
                        <div id="rendered-compiled-prompt" class="text-sm text-slate-100 mono leading-relaxed whitespace-pre-line select-all"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
        <!-- Synchronous Pipeline Logic -->
    <script>
        let optimizedOutputPrompt = "";

        // JavaScript Client FileReader Hook
        function previewSourceImage(inputElement) {
            const emptyState = document.getElementById('upload-empty-state');
            const previewDisplay = document.getElementById('canvas-preview-display');

            if (inputElement.files && inputElement.files[0]) {
                const targetFile = inputElement.files[0];
                const fileReader = new FileReader();

                fileReader.onload = function (event) {
                    // Update Image UI Element Source directly
                    previewDisplay.src = event.target.result;
                    
                    // Toggle Visibility Layers
                    emptyState.classList.add('hidden');
                    previewDisplay.classList.remove('hidden');
                };

                fileReader.readAsDataURL(targetFile);
            }
        }

        // Structural Reverse Compilation Function
        function compileReversePrompt() {
            const subjectVal = document.getElementById('photo-subject').value.trim();
            if(!subjectVal) {
                alert("Please add a short descriptive sentence of the main items/subject in your uploaded photo first!");
                return;
            }

            const framing = document.getElementById('photo-framing').value;
            const mood = document.getElementById('photo-mood').value;

            // Mapping Parameter Vectors
            let framingTags = "";
            if (framing === "closeup") framingTags = "macro extreme closeup capture, intricate textures, shallow depth of field framing, sharp focus details";
            if (framing === "medium_shot") framingTags = "medium portrait photography composition, eye-level angle, realistic lighting alignment";
            if (framing === "wide_angle") framingTags = "cinematic wide-angle tracking shot, environmental storytelling background layers, comprehensive architectural landscape perspective";
            if (framing === "drone_view") framingTags = "high-altitude aerial drone perspective, top-down isometric survey orientation, sweeping geographic scale profile";

            let moodTags = "";
            if (mood === "moody") moodTags = "chiaroscuro lighting, deep heavy shadow structures contrasting clean sharp exposure highlights, high-fidelity atmosphere profile";
            if (mood === "sunlit") moodTags = "bathed in bright direct morning sunlight, natural daytime colors, volumetric sky illumination accents";
            if (mood === "vintage") moodTags = "nostalgic 35mm analog camera profile grain, vintage color grading palette, soft vignette border edges, retro aesthetic look";
            if (mood === "surreal") moodTags = "vibrant neon synthwave color wash filters, cyan and magenta accents, highly detailed futuristic dreamlike moodscape";

            // Compile the String command matching target generator structures
            const builtPromptString = `A high-fidelity photo capturing ${subjectVal}. Styled as a ${framingTags}. ${moodTags}, shot on premium camera, photorealistic 8k output resolution rendering, hyper-detailed surface composition.`;
            
            optimizedOutputPrompt = builtPromptString;

            // DOM UI Swapping Changes
            document.getElementById('terminal-placeholder').classList.add('hidden');
            document.getElementById('terminal-output-view').classList.remove('hidden');
            document.getElementById('rendered-compiled-prompt').textContent = builtPromptString;
        }

        function copyDeconstructedPrompt() {
            if(!optimizedOutputPrompt) {
                alert("Please click the Compile button to generate your structured prompt string first!");
                return;
            }
            navigator.clipboard.writeText(optimizedOutputPrompt)
                .then(() => alert("Your reverse engineered prompt string has been successfully copied straight to your clipboard!"))
                .catch(err => alert("Copy system failed. Please select the text inside the panel and copy manually."));
        }
    </script>
</body>
</html>
